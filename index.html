<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Healing Family</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
*{-webkit-tap-highlight-color:transparent}
:root{
  --bg:#9ed4cf;--surface:#b2dedb;--card:#f2fbfa;--card2:#e0f5f3;
  --border:rgba(0,120,115,.12);--border2:rgba(0,120,115,.24);
  --accent:#007a75;--accent2:#005550;
  --accent-lo:rgba(0,122,117,.08);--accent-md:rgba(0,122,117,.16);--accent-hi:rgba(0,122,117,.30);
  --text:#0a1f1e;--text-dim:#1a4845;--text-muted:#4a8480;
  --danger:#ef4444;--success:#059669;--warn:#f59e0b;
  --pad:max(16px,calc((100% - 640px)/2));
}
html,body,#root{width:100%;height:100%;margin:0;padding:0;background:var(--bg)}
body{font-family:'Space Grotesk',sans-serif;color:var(--text);overflow:hidden;-webkit-text-size-adjust:100%}
.app{display:flex;flex-direction:column;width:100vw;height:100dvh;overflow:hidden}

/* grid bg */
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,100,95,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,100,95,.06) 1px,transparent 1px);
  background-size:40px 40px}

/* top bars */
.top-bar{display:flex;align-items:center;justify-content:space-between;
  padding:16px var(--pad) 0;z-index:2;flex-shrink:0}
.top-bar-title{font-size:12px;font-weight:600;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;font-family:'Orbitron',sans-serif}
.module-header{display:flex;align-items:center;gap:12px;
  padding:14px var(--pad) 0;z-index:2;flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-muted);cursor:pointer;border:none;background:none;transition:color .2s;padding:6px 0;font-family:'Space Grotesk',sans-serif}
.back-btn:hover{color:var(--accent)}
.module-name{font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;flex:1;text-align:center;margin-right:36px;font-family:'Orbitron',sans-serif;color:var(--text-dim)}
.icon-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);background:var(--card);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--text-dim);transition:all .2s;flex-shrink:0}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn.danger{color:var(--danger);border-color:rgba(240,68,68,.3)}
.icon-btn.danger:hover{background:rgba(240,68,68,.08)}

/* screen / scroll area */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 var(--pad) 24px;z-index:1;-webkit-overflow-scrolling:touch}
.screen::-webkit-scrollbar{width:2px}
.screen::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* bottom nav */
.bottom-nav{display:flex;background:var(--card);border-top:1px solid var(--border);
  padding:8px max(0px,calc((100% - 640px)/2)) calc(10px + env(safe-area-inset-bottom));
  flex-shrink:0;z-index:2}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:8px 4px;cursor:pointer;border:none;background:none;min-height:52px;
  color:var(--text-muted);font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
  transition:color .2s;font-family:'Space Grotesk',sans-serif;touch-action:manipulation}
.nav-item.active{color:var(--mod-col,var(--accent))}
.nav-icon{line-height:1;display:flex;align-items:center;justify-content:center}

/* home */
.home-hero{padding:32px 0 22px;text-align:center}
.home-logo{width:60px;height:60px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border2);border-radius:16px;color:var(--accent);
  box-shadow:0 0 24px rgba(0,171,165,.25),inset 0 0 20px rgba(0,171,165,.06)}
.home-title{font-size:24px;font-weight:700;letter-spacing:3px;color:var(--accent2);margin-bottom:4px;font-family:'Orbitron',sans-serif;text-transform:uppercase}
.home-sub{font-size:11px;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase}
.module-card{display:flex;align-items:center;gap:16px;padding:14px 16px;border-radius:10px;
  border:1px solid var(--border);background:var(--card);cursor:pointer;margin-bottom:8px;
  transition:all .2s;position:relative;overflow:hidden;touch-action:manipulation}
.module-card:hover{border-color:var(--mod-col,var(--accent));box-shadow:0 4px 16px rgba(0,100,95,.12)}
.module-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--mod-col,var(--accent));opacity:0;transition:opacity .2s}
.module-card:hover::before,.module-card.has-dot::before{opacity:1}
.mod-icon-wrap{width:44px;height:44px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;background:var(--card2);border:1px solid var(--border);
  color:var(--mod-col,var(--accent))}
.mod-info{flex:1;min-width:0}
.mod-title{font-size:15px;font-weight:600;margin-bottom:3px;color:var(--text)}
.mod-desc{font-size:13px;color:var(--text-muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mod-tag{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;
  padding:2px 7px;border-radius:3px;white-space:nowrap;font-family:'Space Grotesk',sans-serif}

/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;
  margin-bottom:10px}
.card-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:2px}
.card-sub{font-size:12px;color:var(--text-muted);letter-spacing:.4px}

/* section label */
.section-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--text-muted);margin:18px 0 8px;display:flex;align-items:center;gap:8px;font-family:'Space Grotesk',sans-serif}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.accent-line{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:4px 0 14px}

/* stat boxes */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:13px 8px;text-align:center}
.stat-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;margin-top:3px}

/* leaderboard */
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
  background:var(--card2);border:1px solid var(--border);margin-bottom:6px}
.lb-rank{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--text-muted);width:24px;flex-shrink:0;text-align:center}
.lb-score{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--accent2)}

/* progress */
.progress{height:2px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#005550,#0abab5)}

/* badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:600;letter-spacing:.5px;font-family:'Space Grotesk',sans-serif}
.badge-blue{background:rgba(0,171,165,.10);color:#007a75;border:1px solid rgba(0,171,165,.28)}
.badge-green{background:rgba(16,185,129,.08);color:#10b981;border:1px solid rgba(16,185,129,.2)}
.badge-amber{background:rgba(251,191,36,.08);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.badge-red{background:rgba(240,68,68,.08);color:#f04444;border:1px solid rgba(240,68,68,.2)}
.badge-indigo{background:rgba(129,140,248,.08);color:#a5b4fc;border:1px solid rgba(129,140,248,.2)}
.badge-pos{padding:3px 8px;border-radius:3px;font-size:11px;font-weight:700;letter-spacing:.8px;font-family:'Space Grotesk',sans-serif}

/* list rows */
.list-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.list-row:last-child{border-bottom:none}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:12px 18px;border-radius:8px;font-family:'Space Grotesk',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  cursor:pointer;border:none;transition:all .18s;min-height:48px;touch-action:manipulation}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#005550,#0abab5);color:#ffffff;box-shadow:0 4px 14px rgba(0,171,165,.32)}
.btn-primary:not(:disabled):active{filter:brightness(1.1)}
.btn-ghost{background:var(--card2);border:1px solid var(--border2);color:var(--text-dim)}
.btn-danger{background:rgba(240,68,68,.08);border:1px solid rgba(240,68,68,.28);color:#f04444}
.btn-full{width:100%}
.btn-sm{padding:7px 12px;min-height:36px;font-size:12px;border-radius:6px}

/* forms */
.form-group{margin-bottom:13px}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:5px;letter-spacing:1.2px;text-transform:uppercase}
.form-input{width:100%;padding:11px 12px;min-height:44px;background:var(--card2);
  border:1px solid var(--border2);border-radius:7px;color:var(--text);
  font-size:15px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color .18s}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lo)}
.form-input::placeholder{color:var(--text-muted)}
input[type="date"].form-input{color-scheme:light}
select.form-input{cursor:pointer}

/* people chips */
.people-row{display:flex;gap:8px;flex-wrap:wrap}
.person-chip{display:flex;align-items:center;gap:7px;padding:7px 11px;
  border-radius:7px;background:var(--card2);border:1px solid var(--border);cursor:pointer}
.person-chip.selected{border-color:var(--accent);background:var(--accent-lo)}
.person-avatar{font-size:18px}
.person-name{font-size:14px;font-weight:600}

/* dot live */
.dot-live{width:5px;height:5px;border-radius:50%;background:var(--success);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* modals */
.modal-overlay{position:fixed;inset:0;background:rgba(15,30,60,.45);backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center;z-index:1000}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px 16px 0 0;
  width:100%;max-width:640px;max-height:92dvh;
  display:flex;flex-direction:column;
  animation:slideUp .22s ease}
.modal-inner{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:22px 22px 0}
.modal-footer{flex-shrink:0;display:flex;gap:10px;
  padding:14px 22px calc(24px + env(safe-area-inset-bottom));
  border-top:1px solid var(--border)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px;letter-spacing:1px;font-family:'Orbitron',sans-serif;text-transform:uppercase}

/* lottery balls */
.balls{display:flex;gap:6px;flex-wrap:wrap}
.ball{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:13px;font-weight:700;
  border:1px solid var(--border2);background:var(--card2);color:var(--text-muted)}
.ball.win{border-color:var(--accent);color:var(--accent2);background:var(--accent-lo)}
.ball.hot{border-color:#d97706;color:#d97706;background:rgba(217,119,6,.08)}
.ball.bonus{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.08)}
.ball.pick{border-color:var(--accent);color:var(--accent2);background:var(--accent-lo);cursor:pointer}

/* number picker grid */
.num-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;margin-top:8px}
.num-cell{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:12px;font-weight:600;
  border:1px solid var(--border);background:var(--card2);color:var(--text-muted);cursor:pointer;transition:all .15s}
.num-cell.selected{border-color:var(--mod-col,var(--accent));color:var(--mod-col,var(--accent));background:rgba(249,115,22,.08)}

/* expense type chips */
.type-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.type-chip{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:6px;
  border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.type-chip.selected{border-color:var(--t-col);background:var(--t-bg);color:var(--t-col)}

/* settings */
.settings-row{display:flex;align-items:center;justify-content:space-between;
  padding:11px 0;border-bottom:1px solid var(--border);gap:10px}
.settings-row:last-child{border-bottom:none}
.settings-key{font-size:15px;font-weight:600;color:var(--text-dim)}
.settings-val{font-family:'Space Mono',monospace;font-size:14px;font-weight:600;
  color:var(--accent2);background:var(--card2);border:1px solid var(--border2);
  border-radius:6px;padding:5px 10px;width:68px;text-align:center;outline:none}
.settings-val:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lo)}

/* hand result dropdowns */
.hand-row{display:grid;grid-template-columns:1fr 120px 70px;gap:8px;align-items:center;margin-bottom:8px}
.player-label{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600}

/* tabs toggle (small) */
.tab-row{display:flex;gap:6px;margin-bottom:12px}
.tab-pill{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;border:1px solid var(--border2);background:var(--card2);color:var(--text-muted);transition:all .15s}
.tab-pill.active{border-color:var(--mod-col,var(--accent));background:var(--accent-lo);color:var(--mod-col,var(--accent))}

/* settlement */
.settle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.settle-row:last-child{border-bottom:none}

/* fade */
.fade{animation:fadeIn .22s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* empty state */
.empty{text-align:center;padding:48px 16px;color:var(--text-muted)}
.empty-icon{width:52px;height:52px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:12px;color:var(--text-muted)}
.empty-text{font-size:15px;font-weight:600}
.empty-sub{font-size:13px;margin-top:4px;opacity:.7}

/* responsive */
@media(max-width:480px){
  .home-logo{width:50px;height:50px}
  .home-title{font-size:20px}
  .mod-icon-wrap{width:40px;height:40px}
  .stat-val{font-size:19px}
  .ball{width:28px;height:28px}
  .num-grid{grid-template-columns:repeat(8,1fr)}
  .hand-row{grid-template-columns:1fr 110px 60px}
}
@media(max-width:360px){
  .num-grid{grid-template-columns:repeat(7,1fr)}
  .hand-row{grid-template-columns:1fr 100px 56px}
}
</style>
</head>

<div id="root"></div>

const POSITIONS=[
  {key:'jackpot',emoji:'🏆',label:'Jackpot',unique:true},
  {key:'first',emoji:'🥇',label:'1st',unique:true},
  {key:'second',emoji:'🥈',label:'2nd',unique:true},
  {key:'third',emoji:'🥉',label:'3rd',unique:true},
  {key:'fourth',emoji:'4️⃣',label:'4th',unique:true},
  {key:'burned',emoji:'🔥',label:'Burned',unique:false},
];

function calcScore(pts,hands,pid){
  let t=0;
  for(const h of hands){
    const pl=h.placements||{};
    const bonus=(h.bonuses||{})[pid]||0;
    if(pl.jackpot===pid) t+=(pts.jackpot??5);
    else if(pl.first===pid) t+=(pts.first??3);
    else if(pl.second===pid) t+=(pts.second??2);
    else if(pl.third===pid) t+=(pts.third??1);
    else if(pl.fourth===pid) t+=(pts.fourth??0);
    else if((h.burned||[]).includes(pid)) t+=(pts.penalty??-1);
    t+=bonus;
  }
  return t;
}

// Line Chart
function RoundLineChart({round,people,pts}){
  const hands=round.hands;
  if(!hands.length)return null;
  const TEAM_COLORS={A:'#6366f1',B:'#059669'};
  const isTeams=round.mode==='teams'&&round.teams?.length===2;
  const series=isTeams
    ? round.teams.map(team=>{
        let cum=0;const points=[0];
        for(const h of hands){
          const teamScore=team.members.reduce((s,pid)=>s+calcScore(pts,[h],pid),0);
          cum+=teamScore;points.push(cum);
        }
        return{pid:team.id,name:team.label,color:TEAM_COLORS[team.id]||'#94a3b8',points};
      })
    : round.participants.map(p=>p.id||p).map(pid=>{
        const person=people.find(p=>p.id===pid);
        let cum=0;const points=[0];
        for(const h of hands){cum+=calcScore(pts,[h],pid);points.push(cum);}
        return{pid,name:person?.name||'?',color:person?.color||'#94a3b8',points};
      });
  const allVals=series.flatMap(s=>s.points);
  const minY=Math.min(0,...allVals),maxY=Math.max(0,...allVals);
  const range=maxY-minY||1;
  const W=320,H=140,pad={t:16,r:44,b:24,l:32};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const xScale=i=>pad.l+i*(iW/hands.length);
  const yScale=v=>pad.t+iH-(v-minY)/range*iH;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block',marginTop:8}}>
      {/* zero line */}
      {minY<0&&maxY>0&&<line x1={pad.l} y1={yScale(0)} x2={W-pad.r} y2={yScale(0)} stroke="var(--border2)" strokeWidth={1}/>}
      {/* series */}
      {series.map(s=>{
        const pts2=s.points.map((v,i)=>`${xScale(i)},${yScale(v)}`).join(' ');
        return(
          <g key={s.pid}>
            <polyline points={pts2} fill="none" stroke={s.color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/>
            {s.points.map((v,i)=>(
              <circle key={i} cx={xScale(i)} cy={yScale(v)} r={3} fill={s.color}/>
            ))}
            <text x={xScale(hands.length)+3} y={yScale(s.points[s.points.length-1])+4}
              fontSize={9} fill={s.color} fontFamily="'Exo 2',sans-serif" fontWeight={700}>{s.name}</text>
          </g>
        );
      })}
      {/* x labels */}
      {hands.map((_,i)=>(
        <text key={i} x={xScale(i+1)} y={H-6} textAnchor="middle" fontSize={8} fill="var(--text-muted)" fontFamily="'Space Mono',monospace">{i+1}</text>
      ))}
      {/* y labels */}
      {[minY,0,maxY].filter((v,i,a)=>a.indexOf(v)===i).map(v=>(
        <text key={v} x={pad.l-3} y={yScale(v)+4} textAnchor="end" fontSize={8} fill="var(--text-muted)" fontFamily="'Space Mono',monospace">{v}</text>
      ))}
    </svg>
  );
}

      if(t.id===teamId) return{...t,members:t.members.includes(pid)?t.members.filter(x=>x!==pid):[...t.members,pid]};

// Add Hand Modal
function AddHandModal({round,people,pts,onSave,onClose}){
  const pids=round.participants.map(p=>p.id||p);
  const [assignments,setAssignments]=useState({});
  const [bonuses,setBonuses]=useState({});
  const setBonus=(pid,val)=>setBonuses(p=>({...p,[pid]:Number(val)||0}));
  const setAssignment=(pid,pos)=>{
    if(pos==='jackpot'){
      const auto={};
      pids.forEach(p=>auto[p]=p===pid?'jackpot':'fourth');
      setAssignments(auto);
    } else {
      setAssignments(p=>({...p,[pid]:pos}));
    }
  };
  const takenUnique={};
  for(const[p,pos] of Object.entries(assignments)){if(pos&&pos!=='burned')takenUnique[pos]=p;}
  const canSave=pids.length>0&&pids.every(p=>assignments[p]);
  const save=()=>{
    const placements={};const burned=[];
    for(const[pid,pos] of Object.entries(assignments)){
      if(pos==='burned')burned.push(pid);
      else if(pos)placements[pos]=pid;
    }
    onSave({id:uid(),placements,burned,bonuses,ts:Date.now()});
  };
  const posColor={jackpot:'#d97706',first:'#f59e0b',second:'#64748b',third:'#b45309',fourth:'#6366f1',burned:'#dc2626'};
  return(
    <Modal title={`Hand #${round.hands.length+1}`} onClose={onClose}
      footer={<><button className="btn btn-ghost btn-full" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary btn-full" onClick={save} disabled={!canSave}>Save Hand</button></>}>
      <div style={{marginBottom:8,display:'grid',gridTemplateColumns:'1fr 120px 68px',gap:8}}>
        <span className="form-label" style={{margin:0}}>Player</span>
        <span className="form-label" style={{margin:0}}>Position</span>
        <span className="form-label" style={{margin:0}}>Bonus</span>
      </div>
      {pids.map(pid=>{
        const person=people.find(p=>p.id===pid);
        const cur=assignments[pid]||'';
        return(
          <div key={pid} className="hand-row">
            <div className="player-label">
              <span style={{fontSize:18}}>{person?.avatar}</span>
              <span style={{color:person?.color,fontWeight:700,fontSize:13}}>{person?.name}</span>
            </div>
            <select className="form-input" value={cur} onChange={e=>setAssignment(pid,e.target.value)}
              style={{padding:'8px 6px',fontSize:12,color:cur?posColor[cur]:'var(--text-muted)'}}>
              <option value="">— pick —</option>
              {POSITIONS.map(pos=>{
                const taken=pos.unique&&takenUnique[pos.key]&&takenUnique[pos.key]!==pid;
                return<option key={pos.key} value={pos.key} disabled={taken}>{pos.emoji} {pos.label}</option>;
              })}
            </select>
            <input type="number" className="form-input" value={bonuses[pid]||''}
              onChange={e=>setBonus(pid,e.target.value)} placeholder="0"
              style={{padding:'8px 6px',fontSize:12,textAlign:'center'}}/>
          </div>
        );
      })}
    </Modal>
  );
}

// Scores list for a round
function RoundScores({round,people,pts}){
  const isTeams=round.mode==='teams'&&round.teams?.length===2;
  const pids=round.participants.map(p=>p.id||p);
  const scored=pids.map(pid=>{
    const person=people.find(p=>p.id===pid);
    const score=calcScore(pts,round.hands,pid);
    const wins=round.hands.filter(h=>h.placements?.first===pid).length;
    const burned=round.hands.filter(h=>(h.burned||[]).includes(pid)).length;
    return{pid,person,score,wins,burned};
  });
  const total=round.hands.length||1;
  const maxScore=Math.max(...scored.map(s=>Math.abs(s.score)),1);
  const renderPlayer=(s,i)=>(
    <div key={s.pid} style={{marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
        <span style={{fontSize:10,fontFamily:"'Space Mono',monospace",fontWeight:700,color:'var(--text-muted)',width:22,textAlign:'center'}}>{`0${i+1}`.slice(-2)}</span>
        <span style={{fontSize:18}}>{s.person?.avatar}</span>
        <span style={{flex:1,fontSize:13,fontWeight:700,color:s.person?.color}}>{s.person?.name}</span>
        <span style={{fontSize:10,color:'var(--text-muted)',fontFamily:"'Space Mono',monospace"}}>W:{Math.round(s.wins/total*100)}% B:{Math.round(s.burned/total*100)}%</span>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:15,fontWeight:700,
          color:s.score<0?'var(--danger)':'var(--accent2)'}}>{s.score>0?'+':''}{s.score}</span>
      </div>
      <div className="progress">
        <div className="progress-fill" style={{width:`${Math.abs(s.score)/maxScore*100}%`,
          background:`linear-gradient(90deg,${s.person?.color}60,${s.person?.color})`}}/>
      </div>
    </div>
  );
  if(isTeams){
    return(
      <div>
        {round.teams.map((team,ti)=>{
          const members=scored.filter(s=>team.members.includes(s.pid)).sort((a,b)=>b.score-a.score);
          const teamTotal=members.reduce((sum,s)=>sum+s.score,0);
          return(
            <div key={ti}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                padding:'6px 10px',borderRadius:6,marginBottom:8,
                background:ti===0?'rgba(99,102,241,.08)':'rgba(16,185,129,.08)',
                border:`1px solid ${ti===0?'rgba(99,102,241,.2)':'rgba(16,185,129,.2)'}`}}>
                <span style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',
                  color:ti===0?'#6366f1':'#10b981'}}>{team.name||`Team ${ti+1}`}</span>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:14,fontWeight:700,
                  color:teamTotal<0?'var(--danger)':ti===0?'#6366f1':'#10b981'}}>
                  {teamTotal>0?'+':''}{teamTotal}
                </span>
              </div>
              <div style={{paddingLeft:4,marginBottom:ti===0?14:0}}>
                {members.map((s,i)=>renderPlayer(s,i))}
              </div>
              {ti===0&&<div className="accent-line" style={{margin:'4px 0 12px'}}/>}
            </div>
          );
        })}
      </div>
    );
  }
  return(<div>{scored.sort((a,b)=>b.score-a.score).map((s,i)=>renderPlayer(s,i))}</div>);
}

// Hand badge row
function HandBadges({hand,people}){
  const pl=hand.placements||{};

function calcSettlement(event,people){
  const members=event.memberIds.map(id=>people.find(p=>p.id===id)).filter(Boolean);
  if(!members.length)return{share:0,balances:[],transactions:[],total:0};
  const total=event.expenses.reduce((s,e)=>s+e.amount,0);
  const share=total/members.length;
  const paidMap={};members.forEach(p=>{paidMap[p.id]=0});
  event.expenses.forEach(e=>{if(paidMap[e.picId]!==undefined)paidMap[e.picId]+=e.amount});
  const balances=members.map(p=>({...p,paid:paidMap[p.id]||0,owes:share,balance:(paidMap[p.id]||0)-share}));
  // minimal transactions
  const transactions=[];
  const cred=[...balances.filter(b=>b.balance>0.01)].sort((a,b)=>b.balance-a.balance);
  const debt=[...balances.filter(b=>b.balance<-0.01)].sort((a,b)=>a.balance-b.balance);
  let ci=0,di=0;
  while(ci<cred.length&&di<debt.length){
    const amt=Math.min(cred[ci].balance,-debt[di].balance);
    transactions.push({from:debt[di],to:cred[ci],amount:amt});
    cred[ci].balance-=amt;debt[di].balance+=amt;
    if(Math.abs(cred[ci].balance)<0.01)ci++;
    if(Math.abs(debt[di].balance)<0.01)di++;
  }
  return{share,balances,transactions,total};
}

function DonutChart({byType,total,size=110,sw=11}){
  const R=40,cx=size/2,cy=size/2;
  const circ=2*Math.PI*R;
  let cumAngle=0;
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={R} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth={sw}/>
      {byType.map((t,i)=>{
        const frac=t.total/total;
        const segLen=frac*circ;
        const angle=cumAngle;
        cumAngle+=frac*360;
        return(<circle key={i} cx={cx} cy={cy} r={R} fill="none" stroke={t.color} strokeWidth={sw}
          strokeDasharray={`${segLen} ${circ}`} strokeDashoffset={0}
          transform={`rotate(${angle-90} ${cx} ${cy})`} strokeLinecap="butt"/>);
      })}
    </svg>
  );
}

function ExpenseActiveTab({event,events,people,setEvents,setActiveEventId}){
  const [showAdd,setShowAdd]=useState(false);
  const [editExp,setEditExp]=useState(null);
  const [showSettle,setShowSettle]=useState(false);
  const [showNewEvent,setShowNewEvent]=useState(false);
  const [showAllExp,setShowAllExp]=useState(false);
  const createEvent=ev=>{setEvents(es=>[...es,ev]);setActiveEventId(ev.id);setShowNewEvent(false)};
  if(!event){
    return(
      <div>
        <div className="empty" style={{paddingBottom:24}}>
          <div className="empty-icon"><Ic n="expense" size={28}/></div>
          <div className="empty-text">No active event</div>
          <div className="empty-sub" style={{marginBottom:20}}>Create a new event to start tracking expenses</div>
          <button className="btn btn-primary" style={{background:'linear-gradient(135deg,#047857,#059669)'}} onClick={()=>setShowNewEvent(true)}>＋ New Event</button>
        </div>
        {showNewEvent&&<NewEventModal people={people} onSave={createEvent} onClose={()=>setShowNewEvent(false)}/>}
      </div>
    );
  }
  const addOrEdit=exp=>{
    setEvents(es=>es.map(ev=>{
      if(ev.id!==event.id)return ev;
      const exps=editExp?ev.expenses.map(e=>e.id===exp.id?exp:e):[...ev.expenses,exp];
      return{...ev,expenses:exps};
    }));
    setShowAdd(false);setEditExp(null);
  };
  const deleteExp=id=>setEvents(es=>es.map(ev=>ev.id===event.id?{...ev,expenses:ev.expenses.filter(e=>e.id!==id)}:ev));
  const finishEvent=()=>{
    const txns=settle.transactions.map(t=>({fromId:t.from.id,toId:t.to.id,amount:t.amount}));
    setEvents(es=>es.map(ev=>ev.id===event.id?{...ev,finished:true,settlement:{transactions:txns,settledAt:Date.now()}}:ev));
    setActiveEventId(null);setShowSettle(false);
  };
  const settle=calcSettlement(event,people);
  const byDate=[...event.expenses].sort((a,b)=>b.date.localeCompare(a.date));
  const total=settle.total;
  const byType=EXPENSE_TYPES.map(t=>({...t,total:event.expenses.filter(e=>e.type===t.id).reduce((s,e)=>s+e.amount,0)})).filter(t=>t.total>0).sort((a,b)=>b.total-a.total);
  const maxType=byType[0]?.total||1;
  return(
    <div>
      <div className="section-label" style={{marginTop:16}}>Active Event</div>
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div><div className="card-title">{event.name}</div>
            <div className="card-sub">{event.place&&`${event.place} · `}{fmtDate(event.startDate)}–{fmtDate(event.endDate)} · {event.memberIds.length} members</div>
          </div>
          <span className="badge badge-green">Active</span>
        </div>
        <div style={{textAlign:'center',margin:'10px 0',padding:'12px 16px',border:'1px solid rgba(5,150,105,.3)',borderRadius:10,background:'rgba(5,150,105,.06)'}}>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:30,fontWeight:700,color:'#059669',lineHeight:1}}>{fmtAmt(total)}</div>
          <div style={{fontSize:11,color:'var(--text-muted)',marginTop:5}}>{event.expenses.length} expense{event.expenses.length!==1?'s':''} · {fmtAmt(settle.share)} per person</div>
        </div>
        {byType.length>0&&<>
          <div className="accent-line" style={{margin:'10px 0'}}/>
          <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
            <div style={{position:'relative',flexShrink:0}}>
              <DonutChart byType={byType} total={total} size={100} sw={16}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              {byType.map(t=>(
                <div key={t.id} style={{marginBottom:7}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                    <span style={{fontSize:14,lineHeight:1}}>{t.icon}</span>
                    <span style={{flex:1,fontSize:11,fontWeight:600,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.label}</span>
                    <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700,color:t.color,flexShrink:0}}>{fmtAmt(t.total)} <span style={{color:'var(--text-muted)',fontWeight:400}}>{Math.round(t.total/total*100)}%</span></span>
                  </div>
                  <div style={{height:2,background:'rgba(255,255,255,.06)',borderRadius:1}}>
                    <div style={{height:'100%',width:`${t.total/maxType*100}%`,background:t.color,borderRadius:1}}/>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </>}
        {byDate.length>0&&<>
          <div className="accent-line" style={{margin:'12px 0 8px'}}/>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>

          </div>
          {(showAllExp?byDate:byDate.slice(0,5)).map(e=>{
            const et=EXPENSE_TYPES.find(t=>t.id===e.type)||EXPENSE_TYPES[EXPENSE_TYPES.length-1];
            const payer=people.find(p=>p.id===e.picId);

                  <div style={{fontSize:10,color:'var(--text-muted)'}}>Paid by {payer?.name} · {fmtDate(e.date)}</div>

              </div>

      {editExp&&<AddExpenseModal event={event} people={people} expense={editExp} onSave={addOrEdit} onClose={()=>setEditExp(null)}/>}
      <PlacesSection event={event} setEvents={setEvents}/>
      {showSettle&&(
        <Modal title="Settlement" onClose={()=>setShowSettle(false)}
          footer={<><button className="btn btn-ghost btn-full" onClick={()=>setShowSettle(false)}>Close</button>
            <button className="btn btn-danger btn-full" onClick={finishEvent}>Finish Event</button></>}>
          {settle.transactions.length>0&&<>
            <div className="section-label">Transfers</div>
            {settle.transactions.map((t,i)=>(
              <div key={i} className="card" style={{padding:'10px 14px',display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:16}}>{t.from.avatar}</span>
                <span style={{fontSize:12,fontWeight:700,color:t.from.color}}>{t.from.name}</span>
                <span style={{fontSize:12,color:'var(--text-muted)',flex:1,textAlign:'center'}}>→</span>
                <span style={{fontSize:16}}>{t.to.avatar}</span>
                <span style={{fontSize:12,fontWeight:700,color:t.to.color}}>{t.to.name}</span>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,fontWeight:700,color:'#059669'}}>{fmtAmt(t.amount)}</span>
              </div>
            ))}
          </>}
        </Modal>
      )}
    </div>
  );
}

const matchInfo=(winNums,userNums,bonusNum)=>{
  const matched=winNums.filter(n=>userNums.includes(n)).length;
  const bonusMatch=bonusNum!=null&&userNums.includes(bonusNum);
  return{matched,bonusMatch};
};
const prizeTier=(matched,bonusMatch)=>{
  if(matched===6)return{label:'Jackpot 1!',cls:'badge-amber'};
  if(matched===5&&bonusMatch)return{label:'Jackpot 2',cls:'badge-amber'};
  if(matched===5)return{label:'Prize 3',cls:'badge-green'};
  if(matched===4)return{label:'Prize 4',cls:'badge-blue'};
  if(matched===3)return{label:'Prize 5',cls:'badge-blue'};
  return{label:'No prize',cls:'badge-blue'};
};
const computeHotNumbers=(results,type,topN=5)=>{
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);
  const cutStr=cutoff.toISOString().slice(0,10);
  const recent=results.filter(r=>r.type===type&&r.date>=cutStr);
  const total=recent.length;
  if(!total)return[];
  const freq={};
  recent.forEach(r=>{r.numbers.forEach(n=>{freq[n]=(freq[n]||0)+1});});
  return Object.entries(freq).map(([n,c])=>({n:Number(n),c,pct:Math.round(c/total*100)}))
    .sort((a,b)=>b.c-a.c).slice(0,topN);
};

function VietlottDashTab({vietData,setVietData,vietSettings}){
  const {results,funds}=vietData;
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState('');
  const [lastSynced,setLastSynced]=useState(null);
  const totalFund=funds.filter(f=>(!f.type||f.type==='fund')).reduce((s,f)=>s+f.amount,0);
  const totalSpent=results.length*10000+funds.filter(f=>f.type==='ticket').reduce((s,f)=>s+f.amount,0);
  const net=totalFund-totalSpent;
  const latest645=results.filter(r=>r.type==='645').sort((a,b)=>b.date.localeCompare(a.date))[0];
  const latest655=results.filter(r=>r.type==='655').sort((a,b)=>b.date.localeCompare(a.date))[0];
  const hot645=computeHotNumbers(results,'645');
  const hot655=computeHotNumbers(results,'655');
  const syncLatest=async()=>{
    setSyncing(true);setSyncMsg('');
    const BASE='https://raw.githubusercontent.com/vietvudanh/vietlott-data/main/data/';
    const parseJsonl=(text,type)=>text.trim().split('\n').map(line=>{
      try{
        const{date,result}=JSON.parse(line);
        if(!date||!Array.isArray(result))return null;
        const is655=type==='655';
        const numbers=is655?result.slice(0,6):result.slice(0,6);
        const bonus=is655&&result.length>6?result[result.length-1]:null;
        return{id:uid(),type,date,numbers,bonus};
      }catch{return null;}
    }).filter(Boolean);
    try{
      const [r1,r2]=await Promise.all([
        fetch(BASE+'power645.jsonl',{signal:AbortSignal.timeout(15000)}),
        fetch(BASE+'power655.jsonl',{signal:AbortSignal.timeout(15000)})
      ]);
      if(!r1.ok||!r2.ok)throw new Error('Fetch error '+r1.status+'/'+r2.status);
      const [t1,t2]=await Promise.all([r1.text(),r2.text()]);
      const fetched=[...parseJsonl(t1,'645'),...parseJsonl(t2,'655')];
      let added=0;
      setVietData(d=>{
        const existing=new Set(d.results.map(r=>`${r.type}-${r.date}`));
        const toAdd=fetched.filter(r=>!existing.has(`${r.type}-${r.date}`));
        added=toAdd.length;
        return toAdd.length?{...d,results:[...d.results,...toAdd]}:d;
      });
      setLastSynced(Date.now());
      setSyncMsg(`+${added} new draw${added!==1?'s':''} added`);
    }catch(e){
      setSyncMsg('Sync failed — '+e.message);
    }
    setSyncing(false);
  };
  const DrawCard=({r,label,userNums})=>{
    if(!r)return<div className="card"><div style={{color:'var(--text-muted)',fontSize:12}}>No {label} results yet</div></div>;
    const{matched,bonusMatch}=matchInfo(r.numbers,userNums||[],r.bonus);
    const tier=prizeTier(matched,bonusMatch);
    return(
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <span style={{fontSize:11,color:'var(--text-dim)',fontWeight:600}}>{fmtDate(r.date)}</span>
          <div style={{display:'flex',gap:6}}>
            <span className="badge badge-amber">{label}</span>
            {matched>0&&<span className={`badge ${tier.cls}`}>{tier.label}</span>}
          </div>
        </div>
        <div className="balls">
          {r.numbers.map(n=><div key={n} className={`ball${(userNums||[]).includes(n)?' win':''}`}>{n}</div>)}
          {r.bonus!=null&&<div className="ball bonus">{r.bonus}</div>}
        </div>
        {(userNums||[]).length>0&&<>
          <div style={{display:'flex',alignItems:'center',gap:6,margin:'10px 0 6px'}}>
            <span style={{fontSize:10,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:.8,whiteSpace:'nowrap'}}>Your picks</span>
            <div style={{flex:1,height:1,background:'var(--border)'}}/>
            <span style={{fontSize:10,color:matched>0?'var(--success)':'var(--text-muted)',fontWeight:600}}>
              {matched} match{bonusMatch?' + bonus':''}
            </span>
          </div>
          <div className="balls">
            {(userNums||[]).map(n=>{
              const hit=r.numbers.includes(n);
              return(
                <div key={n} style={{
                  width:32,height:32,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:11,fontWeight:700,border:`2px solid ${hit?'#d97706':'var(--border2)'}`,
                  background:hit?'rgba(217,119,6,.15)':'transparent',
                  color:hit?'#d97706':'var(--text-muted)',transition:'all .2s'
                }}>{n}</div>
              );
            })}
          </div>
        </>}
      </div>
    );
  };
  const fmtSyncTime=ts=>{
    const d=new Date(ts);
    return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+', '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  };
  return(
    <div>
      <div className="stat-grid" style={{marginTop:16}}>
        {[{v:fmtShort(totalFund),l:'Fund',c:'#d97706'},{v:fmtShort(totalSpent),l:'Spent',c:'#dc2626'},{v:(net>=0?'+':'')+fmtShort(net),l:'Net',c:net>=0?'#059669':'#dc2626'}].map(s=>(
          <div key={s.l} className="stat-box"><div className="stat-val" style={{color:s.c,fontSize:16}}>{s.v}</div><div className="stat-lbl">{s.l}</div></div>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,marginTop:10,padding:'10px 14px',borderRadius:10,border:'1px solid rgba(217,119,6,.22)',background:'rgba(217,119,6,.06)'}}>
        <div>
          <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:2}}>Last updated</div>
          <div style={{fontSize:12,fontWeight:600,color:lastSynced?'var(--text-dim)':'var(--text-muted)'}}>
            {lastSynced?fmtSyncTime(lastSynced):'Never synced'}
          </div>
          {syncMsg&&<div style={{fontSize:10,marginTop:3,color:syncMsg.startsWith('Sync failed')?'var(--danger)':'var(--success)'}}>{syncMsg}</div>}
        </div>
        <button
          onClick={syncLatest}
          disabled={syncing}
          style={{flexShrink:0,display:'flex',alignItems:'center',gap:5,padding:'7px 14px',borderRadius:8,border:'none',background:syncing?'rgba(217,119,6,.15)':'linear-gradient(135deg,#92400e,#d97706)',color:syncing?'#d97706':'#fff',fontSize:11,fontWeight:700,cursor:syncing?'default':'pointer',transition:'all .2s',minHeight:34,whiteSpace:'nowrap'}}
        >

      <div className="section-label">Latest 6/45</div>
      <DrawCard r={latest645} label="6/45" userNums={vietSettings.nums645}/>
      <div className="section-label">Latest 6/55</div>

        <div className="card"><div style={{display:'flex',gap:10,justifyContent:'space-between'}}>

            </div>

        <div className="card"><div style={{display:'flex',gap:10,justifyContent:'space-between'}}>

            <div key={n} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <div className="ball hot">{n}</div>
              <span style={{fontSize:10,fontWeight:700,color:'#d97706'}}>{pct}%</span>
            </div>
          ))}
        </div></div></>}
    </div>
  );
}

        <button className="btn btn-sm" style={{background:'linear-gradient(135deg,#92400e,#d97706)',color:'#fff',border:'none',minHeight:34,borderRadius:8,fontSize:11,fontWeight:700,cursor:'pointer',padding:'6px 10px'}} onClick={()=>setShowAdd(true)}>＋ Add</button>
      </div>
      {!sorted.length&&<div className="empty"><div className="empty-icon"><Ic n="finance" size={28}/></div><div className="empty-text">No entries yet</div></div>}
      {sorted.map(f=>{
        const ft=FUND_TYPES.find(t=>t.id===(f.type||'fund'));
        return(
        <div key={f.id} style={{padding:'10px 14px',marginBottom:8,border:`2px solid ${ft.color}`,borderRadius:12,background:'#ffffff',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:20}}>{people.find(p=>p.name===f.person)?.avatar||'👤'}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{f.person}</span>
                <span style={{fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:4,background:`${ft.color}18`,color:ft.color,border:`1px solid ${ft.color}44`,whiteSpace:'nowrap'}}>{ft.icon} {ft.label}</span>
              </div>
              <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{fmtDate(f.date)}{f.note?` · ${f.note}`:''}</div>
            </div>
            <span style={{fontFamily:"'Space Mono',monospace",fontSize:14,fontWeight:700,color:ft.color}}>{fmtAmt(f.amount)}</span>
            <button className="icon-btn" style={{width:28,height:28}} onClick={()=>setEditFund(f)}><Ic n="edit" size={13}/></button>
            <button className="icon-btn danger" style={{width:28,height:28}} onClick={()=>delFund(f.id)}><Ic n="trash" size={13}/></button>
          </div>
        </div>
        );
      })}
      {showAdd&&<AddFundModal people={people} onSave={addFund} onClose={()=>setShowAdd(false)}/>}
      {editFund&&<AddFundModal people={people} fund={editFund} onSave={saveFund} onClose={()=>setEditFund(null)}/>}
    </div>
  );
}

    <>

        <button className="back-btn" onClick={onBack}><Ic n="back" size={14}/> Home</button>

// ══════════════════════════════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════════════════════════════
function NumPicker({selected,setSelected,max,modCol}){
  const sel=Array.isArray(selected)?selected:[];
  const toggle=n=>{const next=sel.includes(n)?sel.filter(x=>x!==n):[...sel,n].slice(0,6);setSelected(next);};
  const cols=max<=45?9:10;
  return(
    <div style={{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`,gap:4,marginTop:6}}>
      {Array.from({length:max},(_,i)=>i+1).map(n=>(
        <div key={n} className={`num-cell${sel.includes(n)?' selected':''}`}
          style={{'--mod-col':modCol||'#d97706'}} onClick={()=>toggle(n)}>{n}</div>
      ))}
    </div>
  );
}

function SettingsScreen({onBack,people,setPeople,settings,setSettings,rounds,setRounds,events,setEvents,vietData,setVietData,activeRoundId,setActiveRoundId,activeEventId,setActiveEventId}){
  const [editPerson,setEditPerson]=useState(null);
  const [addPerson,setAddPerson]=useState(false);
  const [syncStatus,setSyncStatus]=useState('');
  const [syncing,setSyncing]=useState(false);
  const [syncToken,setSyncToken]=useState(()=>store.get('hf_sync_token',''));
  const [syncGist,setSyncGist]=useState(()=>store.get('hf_sync_gist',''));

  const savePerson=p=>{
    setPeople(ps=>ps.some(x=>x.id===p.id)?ps.map(x=>x.id===p.id?p:x):[...ps,p]);
    setEditPerson(null);setAddPerson(false);
  };
  const deletePerson=id=>setPeople(ps=>ps.filter(p=>p.id!==id));

  const setCardPts=(key,val)=>setSettings(s=>({...s,card:{...s.card,[key]:Number(val)}}));
  const setVietSetting=(key,val)=>setSettings(s=>({...s,vietlott:{...s.vietlott,[key]:val}}));

  const pushToCloud=async()=>{
    if(!syncToken||!syncGist){setSyncStatus('Enter token and gist ID first');return;}
    setSyncing(true);setSyncStatus('Pushing…');
    const data={people,settings,rounds,activeRoundId,events,activeEventId,vietData};
    try{
      const res=await fetch(`https://api.github.com/gists/${syncGist}`,{
        method:'PATCH',headers:{'Authorization':`token ${syncToken}`,'Content-Type':'application/json'},
        body:JSON.stringify({files:{'healing-family.json':{content:JSON.stringify(data,null,2)}}})
      });
      if(!res.ok)throw new Error(res.status);
      store.set('hf_sync_token',syncToken);store.set('hf_sync_gist',syncGist);
      setSyncStatus('Pushed successfully');
    }catch(e){setSyncStatus('Push failed: '+e.message)}
    setSyncing(false);
  };
  const pullFromCloud=async()=>{
    if(!syncToken||!syncGist){setSyncStatus('Enter token and gist ID first');return;}
    setSyncing(true);setSyncStatus('Pulling…');
    try{
      const res=await fetch(`https://api.github.com/gists/${syncGist}`,{headers:{'Authorization':`token ${syncToken}`}});
      if(!res.ok)throw new Error(res.status);
      const json=await res.json();
      const content=json.files['healing-family.json']?.content;
      if(!content)throw new Error('File not found in gist');
      const d=JSON.parse(content);
      if(d.people)setPeople(d.people);
      if(d.settings)setSettings(d.settings);
      if(d.rounds)setRounds(d.rounds);
      if(d.activeRoundId!==undefined)setActiveRoundId(d.activeRoundId);
      if(d.events)setEvents(d.events);
      if(d.activeEventId!==undefined)setActiveEventId(d.activeEventId);
      if(d.vietData)setVietData(d.vietData);
      store.set('hf_sync_token',syncToken);store.set('hf_sync_gist',syncGist);
      setSyncStatus('Pulled successfully');
    }catch(e){setSyncStatus('Pull failed: '+e.message)}
    setSyncing(false);
  };

  const cardPts=settings.card;
  const vs=settings.vietlott;
  return(
    <>
      <div className="module-header">
        <button className="back-btn" onClick={onBack}><Ic n="back" size={14}/> Home</button>
        <div className="module-name">Settings</div>
      </div>
      <div className="screen fade">
        {/* People */}
        <div className="section-label" style={{marginTop:16}}>People</div>
        <div className="card">
          {people.map(p=>(
            <div key={p.id} className="settings-row">
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:22}}>{p.avatar}</span>
                <span style={{fontSize:14,fontWeight:700,color:p.color}}>{p.name}</span>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button className="icon-btn" style={{width:30,height:30}} onClick={()=>setEditPerson(p)}><Ic n="edit" size={13}/></button>
                <button className="icon-btn danger" style={{width:30,height:30}} onClick={()=>deletePerson(p.id)}><Ic n="trash" size={13}/></button>
              </div>
            </div>
          ))}
          <button className="btn btn-ghost btn-full btn-sm" style={{marginTop:10}} onClick={()=>setAddPerson(true)}>＋ Add Person</button>
        </div>

        {/* Card Game Points */}
        <div className="section-label">Card Game Points</div>
        <div className="card">
          {[['jackpot','Jackpot'],['first','1st Place'],['second','2nd Place'],['third','3rd Place'],['fourth','4th Place'],['penalty','Burned']].map(([k,l])=>(
            <div key={k} className="settings-row">
              <span className="settings-key">{l}</span>
              <input type="number" className="settings-val" value={cardPts[k]??''} onChange={e=>setCardPts(k,e.target.value)}/>
            </div>
          ))}
        </div>

        {/* Vietlott */}
        <div className="section-label">Vietlott</div>
        <div className="card">
          <div className="settings-row">
            <span className="settings-key">Tracking from</span>
            <input type="date" style={{fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:600,color:'#fbbf24',background:'var(--card2)',border:'1px solid var(--border2)',borderRadius:6,padding:'4px 8px',outline:'none',colorScheme:'dark'}}
              value={vs.startDate} onChange={e=>setVietSetting('startDate',e.target.value)}/>
          </div>
          <div style={{marginTop:12}}>
            <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>
              6/45 — Lucky Numbers ({(vs.nums645||[]).length}/6)
            </div>
            <NumPicker selected={vs.nums645||[]} setSelected={v=>setVietSetting('nums645',v)} max={45} modCol="#d97706"/>
          </div>
          <div style={{marginTop:16}}>
            <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>
              6/55 — Lucky Numbers ({(vs.nums655||[]).length}/6)
            </div>
            <NumPicker selected={vs.nums655||[]} setSelected={v=>setVietSetting('nums655',v)} max={55} modCol="#d97706"/>
          </div>
        </div>

        {/* Cloud Sync */}
        <div className="section-label">Cloud Sync</div>
        <div className="card">
          <div className="form-group">
            <label className="form-label">GitHub Personal Access Token</label>
            <input className="form-input" type="password" value={syncToken} onChange={e=>setSyncToken(e.target.value)} placeholder="ghp_…"/>
          </div>
          <div className="form-group">
            <label className="form-label">Gist ID</label>
            <input className="form-input" value={syncGist} onChange={e=>setSyncGist(e.target.value)} placeholder="Gist ID (from gist.github.com)"/>
          </div>
          {syncStatus&&<div style={{fontSize:11,color:syncStatus.startsWith('Pushed')||syncStatus.startsWith('Pulled')?'var(--success)':'var(--danger)',marginBottom:10,fontWeight:600}}>{syncStatus}</div>}
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary btn-full btn-sm" onClick={pushToCloud} disabled={syncing}><Ic n="upload" size={13}/> Push</button>
            <button className="btn btn-ghost btn-full btn-sm" onClick={pullFromCloud} disabled={syncing}><Ic n="download" size={13}/> Pull</button>
          </div>
        </div>
        {/* Danger Zone */}
        <div className="section-label">Danger Zone</div>
        <div className="card">
          <div className="settings-row" style={{flexDirection:'column',alignItems:'flex-start',gap:6}}>
            <span className="settings-key" style={{fontSize:12}}>Reset all app data</span>
            <span style={{fontSize:10,color:'var(--text-muted)'}}>Clears rounds, events, Vietlott history and resets settings. People are kept.</span>
          </div>
          <button className="btn btn-danger btn-full btn-sm" style={{marginTop:8}} onClick={()=>{
            if(!window.confirm('Reset all data? This cannot be undone.'))return;
            setRounds([]);setActiveRoundId(null);
            setEvents([]);setActiveEventId(null);
            setVietData({results:[],funds:[],extras:[]});
            setSettings(DEFAULT_SETTINGS);
          }}>Reset All Data</button>
        </div>
        <div style={{height:24}}/>
      </div>
      {(editPerson||addPerson)&&<PersonModal person={editPerson||null} onSave={savePerson} onClose={()=>{setEditPerson(null);setAddPerson(false)}}/>}
    </>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// HOME SCREEN
// ══════════════════════════════════════════════════════════════════════════
function HomeScreen({onModule,onSettings,rounds,activeRoundId,events,activeEventId}){
  const hasActiveRound=rounds.some(r=>r.id===activeRoundId&&!r.finished);
  const hasActiveEvent=events.some(e=>e.id===activeEventId&&!e.finished);
  const modules=[
    {id:'card',    icon:'card',    title:'Card Game',   tag:'TRACKER', desc:'Track rounds, hands, scores and player stats', col:'#6366f1', dot:hasActiveRound},
    {id:'expense', icon:'expense', title:'Group Expense',tag:'SPLITTER',desc:'Log shared expenses and settle up instantly',  col:'#059669', dot:hasActiveEvent},
    {id:'vietlott',icon:'lottery', title:'Vietlott',    tag:'LOTTERY', desc:'Track draws, match numbers, manage the group pool', col:'#d97706', dot:false},
  ];
  return(
    <>
      <div className="top-bar">
        <span className="top-bar-title">Healing Family</span>
        <button className="icon-btn" onClick={onSettings}><Ic n="settings" size={17}/></button>
      </div>
      <div className="screen fade">
        <div className="home-hero">
          <div className="home-logo"><Ic n="home" size={28}/></div>
          <div className="home-title">Healing Family</div>
          <div className="home-sub">Your family hub</div>
        </div>
        <div className="accent-line"/>
        <div className="section-label">Modules</div>
        {modules.map(m=>(
          <div key={m.id} className={`module-card${m.dot?' has-dot':''}`} style={{'--mod-col':m.col}} onClick={()=>onModule(m.id)}>
            <div className="mod-icon-wrap"><Ic n={m.icon} size={22}/></div>
            <div className="mod-info">
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                <div className="mod-title">{m.title}</div>
                {m.dot&&<span className="dot-live"/>}
                <span className="mod-tag" style={{marginLeft:'auto',flexShrink:0,color:m.col,borderColor:m.col+'40',background:m.col+'10',border:'1px solid'}}>{m.tag}</span>
              </div>
              <div className="mod-desc">{m.desc}</div>
            </div>
          </div>
        ))}
        <div style={{height:16}}/>
        <div style={{textAlign:'center',fontSize:10,color:'var(--text-muted)',letterSpacing:1.5,textTransform:'uppercase'}}>
          Healing Family · 3 modules
        </div>
      </div>
    </>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════════════════
function App(){
  const [people,setPeople]=useState(()=>store.get('hf_people',DEFAULT_PEOPLE));
  const [settings,setSettings]=useState(()=>{
    const s=store.get('hf_settings',DEFAULT_SETTINGS);
    const vl={...DEFAULT_SETTINGS.vietlott,...(s.vietlott||{})};
    if(!Array.isArray(vl.nums645))vl.nums645=[];
    if(!Array.isArray(vl.nums655))vl.nums655=[];
    return{...DEFAULT_SETTINGS,...s,card:{...DEFAULT_SETTINGS.card,...(s.card||{})},vietlott:vl};
  });
  const [rounds,setRounds]=useState(()=>store.get('hf_rounds',[]));
  const [activeRoundId,setActiveRoundId]=useState(()=>store.get('hf_active_round',null));
  const [events,setEvents]=useState(()=>store.get('hf_events',[]));
  const [activeEventId,setActiveEventId]=useState(()=>store.get('hf_active_event',null));
  const [vietData,setVietData]=useState(()=>store.get('hf_viet',{results:[],funds:[],extras:[]}));
  const [screen,setScreen]=useState('home');

  useEffect(()=>store.set('hf_people',people),[people]);
  useEffect(()=>store.set('hf_settings',settings),[settings]);
  useEffect(()=>store.set('hf_rounds',rounds),[rounds]);
  useEffect(()=>store.set('hf_active_round',activeRoundId),[activeRoundId]);
  useEffect(()=>store.set('hf_events',events),[events]);
  useEffect(()=>store.set('hf_active_event',activeEventId),[activeEventId]);
  useEffect(()=>store.set('hf_viet',vietData),[vietData]);

  const goHome=()=>setScreen('home');
  const pts=settings.card;
  const vietSettings=settings.vietlott;

  return(
    <div className="app">
      <div className="bg-grid"/>
      {screen==='home'&&<HomeScreen onModule={setScreen} onSettings={()=>setScreen('settings')} rounds={rounds} activeRoundId={activeRoundId} events={events} activeEventId={activeEventId}/>}
      {screen==='card'&&<CardModule onBack={goHome} people={people} rounds={rounds} setRounds={setRounds} activeRoundId={activeRoundId} setActiveRoundId={setActiveRoundId} pts={pts}/>}
      {screen==='expense'&&<ExpenseModule onBack={goHome} people={people} events={events} setEvents={setEvents} activeEventId={activeEventId} setActiveEventId={setActiveEventId}/>}
      {screen==='vietlott'&&<VietlottModule onBack={goHome} people={people} vietData={vietData} setVietData={setVietData} vietSettings={vietSettings}/>}
      {screen==='settings'&&<SettingsScreen onBack={goHome} people={people} setPeople={setPeople} settings={settings} setSettings={setSettings} rounds={rounds} setRounds={setRounds} events={events} setEvents={setEvents} vietData={vietData} setVietData={setVietData} activeRoundId={activeRoundId} setActiveRoundId={setActiveRoundId} activeEventId={activeEventId} setActiveEventId={setActiveEventId}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
